name: Release to App Store
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to submit (e.g. v1.2.3)'
        type: string
        required: true
      dry_run:
        description: 'Find build and log candidate but skip ASC submission'
        type: boolean
        default: false
permissions:
  contents: write
  id-token: write
jobs:
  call:
    uses: RiddimSoftware/riddim-release/.github/workflows/release-app-store.yml@v1
    with:
      apple_app_id:         ${{ vars.APPLE_APP_ID }}
      bundle_id:            ${{ vars.BUNDLE_ID }}
      ios_workdir:          ${{ vars.IOS_WORKDIR || 'ios' }}
      primary_locale:       ${{ vars.PRIMARY_LOCALE }}
      tag:                  ${{ github.event.release.tag_name || inputs.tag }}
      dry_run:              ${{ inputs.dry_run || false }}
      approval_environment: ${{ vars.APPROVAL_ENVIRONMENT || 'app-store-release' }}
      runner_labels_mac:    ${{ vars.RUNNER_LABELS_MAC }}
      runner_labels_linux:  ${{ vars.RUNNER_LABELS_LINUX }}
      force_self_hosted:    false
    secrets: inherit
