name: Create Release
on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        type: choice
        default: minor
        options: [patch, minor, major]
      dry_run:
        description: 'Skip TestFlight upload and draft release'
        type: boolean
        default: false
permissions:
  contents: write
  id-token: write
jobs:
  call:
    uses: RiddimSoftware/riddim-release/.github/workflows/build-deploy.yml@v1
    with:
      apple_app_id:        ${{ vars.APPLE_APP_ID }}
      bundle_id:           ${{ vars.BUNDLE_ID }}
      team_id:             ${{ vars.TEAM_ID }}
      scheme:              ${{ vars.SCHEME }}
      xcodeproj_path:      ${{ vars.XCODEPROJ_PATH }}
      ios_workdir:         ${{ vars.IOS_WORKDIR || 'ios' }}
      primary_locale:      ${{ vars.PRIMARY_LOCALE }}
      bump:                ${{ inputs.bump }}
      dry_run:             ${{ inputs.dry_run }}
      runner_labels_mac:   ${{ vars.RUNNER_LABELS_MAC }}
      runner_labels_linux: ${{ vars.RUNNER_LABELS_LINUX }}
      force_self_hosted:   false
    secrets: inherit
